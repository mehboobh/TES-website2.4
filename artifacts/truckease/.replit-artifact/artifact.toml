kind = "web"
previewPath = "/"
title = "TruckEase"
version = "1.0.0"
id = "artifacts/truckease"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22248

[services.development]
run = "pnpm --filter @workspace/truckease run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/truckease", "run", "build" ]
publicDir = "artifacts/truckease/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22248"
BASE_PATH = "/"
